[build]
  command = "npm run build:netlify"
  publish = "dist"

[[redirects]]
  from = "/tournaments/*"
  to = "/tournaments/[slug].html"
  status = 200

[[redirects]]
  from = "/check-in/*"
  to = "/check-in/[slug].html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_expo/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
